name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            flag: -m
          - os: windows-2022
            flag: -w
          - os: ubuntu-latest
            flag: -l
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'

      - name: Install dependencies
        run: |
          yarn set version 1.22.18
          yarn

      - name: Build and publish release
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ github.token }}
        run: yarn build ${{ matrix.flag }} --publish always

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist_electron/bundled/*
          if-no-files-found: ignore

  homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-macos-latest
          path: dist

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG=$(ls dist/arveli-v*-mac-arm64.dmg 2>/dev/null | head -1)
          if [ -z "$DMG" ]; then
            echo "No macOS DMG found — skipping Homebrew update"
            exit 0
          fi
          SHA256=$(sha256sum "$DMG" | cut -d' ' -f1)

          git clone https://x-access-token:${GH_TOKEN}@github.com/wemit/homebrew-arveli.git tap
          cd tap
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git checkout -b "release-${VERSION}"

          mkdir -p Casks
          {
            printf 'cask "arveli" do\n'
            printf '  version "%s"\n' "$VERSION"
            printf '  sha256 "%s"\n' "$SHA256"
            printf '\n'
            printf '  url "https://github.com/wemit/arveli/releases/download/v#{version}/arveli-v#{version}-mac-arm64.dmg"\n'
            printf '  name "arveli"\n'
            printf '  desc "Offline desktop accounting with Estonian compliance"\n'
            printf '  homepage "https://github.com/wemit/arveli"\n'
            printf '\n'
            printf '  app "arveli.app"\n'
            printf 'end\n'
          } > Casks/arveli.rb

          git add Casks/arveli.rb
          git commit -m "books v${VERSION}"
          git push --force origin "release-${VERSION}"

          curl -s -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/wemit/homebrew-arveli/pulls \
            -d "{\"title\":\"books v${VERSION}\",\"head\":\"release-${VERSION}\",\"base\":\"main\",\"body\":\"Automated cask update for v${VERSION}.\"}"

  scoop:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-windows-2022
          path: dist

      - name: Update Scoop bucket
        env:
          GH_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXE=$(ls dist/arveli-v*-windows-portable-x64.exe 2>/dev/null | head -1)
          if [ -z "$EXE" ]; then
            echo "No Windows portable exe found — skipping Scoop update"
            exit 0
          fi
          SHA256=$(sha256sum "$EXE" | cut -d' ' -f1)

          git clone https://x-access-token:${GH_TOKEN}@github.com/wemit/scoop-arveli.git bucket
          cd bucket
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git checkout -b "release-${VERSION}"

          mkdir -p bucket
          jq -n \
            --arg v "$VERSION" \
            --arg h "sha256:$SHA256" \
            '{
              version: $v,
              description: "Offline desktop accounting with Estonian compliance",
              homepage: "https://github.com/wemit/arveli",
              license: "AGPL-3.0",
              url: ("https://github.com/wemit/arveli/releases/download/v" + $v + "/arveli-v" + $v + "-windows-portable-x64.exe"),
              hash: $h
            }' > bucket/arveli.json

          git add bucket/arveli.json
          git commit -m "books v${VERSION}"
          git push --force origin "release-${VERSION}"

          curl -s -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/wemit/scoop-arveli/pulls \
            -d "{\"title\":\"books v${VERSION}\",\"head\":\"release-${VERSION}\",\"base\":\"main\",\"body\":\"Automated manifest update for v${VERSION}.\"}"
